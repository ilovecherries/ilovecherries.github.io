<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/homepage.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>home</title>
</head>
<body>
<div id="wrapper">
    <!-- derpibooru source: https://derpibooru.org/images/1819406 -->
    <img src="motivation.png" alt="you matter. you have value. nothing you or anyone can do will change that.">
    <ul class="content">
        <li><a href="https://smilebasicsource.com/?p=page-937">offtopic sbs</a></li>
        <li><a href="https://twitter.com">twitter</a></li>
        <li><a href="https://github.com/">github</a></li>
        <li><a href="https://boards.4channel.org/mlp/">/mlp/</a></li>
        <li><a href="https://www.fimfiction.net/">fimfiction</a></li>
    </ul>
    <style>
        :root {
            --main-bg-color: #010505;
            --main-text-color: #8f6107;
            --hover-text-color: #802033;
        }

        body {
            background-color: var(--main-bg-color);
            color: var(--main-text-color);
            font-family: "Helvetica", Sans;
            font-size: 1.4em;
            height: 100%;
            width: 100%;
            margin: 0;
        }

        img {
            width: 15em;
        }

        #wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100%;
            max-height: 100%;
            height: 100vh;
            width: 100vw;
            margin: 0;
            padding: 0;
            flex-direction: column;
        }

        h1 {
            font-weight: normal;
            font-size: 3em;
            padding: 0;
            margin: 0.35em;
        }

        div {
            margin-top: 16px;
        }

        ul {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            list-style: none;
            margin: 0.2em;
            padding: 0;
            font-size: 0.9em;
        }

        li {
            padding: 10px;
            margin: 0;
        }

        a {
            color: var(--main-text-color);
        }

        a:hover {
            color: var(--hover-text-color);
        }

        .center-text {
            text-align: center;
        }
    </style>
</div>
</body>
</html>
